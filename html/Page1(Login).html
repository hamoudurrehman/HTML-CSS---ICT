<!DOCTYPE html>
<html>
    <head>
        <title>Login - OmniStyle</title>
        <!--Attaching the css style sheet-->
        <link rel="stylesheet" href="CSS_file(Page1).css"/>
    </head>
    <body>
        <!--Div section for header-->
        <div class="head">
            <div class="logo"><!--Alignment style for logo-->
                <img src="Logo.png" height="125px"="Logo"><!--Inserting Logo-->
            </div>
            <header><!--Displaying header-->
                <h1>Welcome Back!</h1>
            </header>
        </div>
        <!--The main login panel-->
        <div class="main">
            <main>
                <div class="login">
                    <h1>LOGIN</h1>
                </div>
                
                <input type="text" placeholder="Enter username" required><br><!--For inserting the username text box-->
                <input type="password" placeholder="Enter password" required><br><!--For inserting the password text box-->
                
                <div class="combine">
                    <input type="checkbox" id="remember">
                        <label for="remember">Remember me </label><!--Inserting checkbox for remember me-->
                    <div class="password"><!--Adds link if user forgets password-->
                        <a href="#">Forgot Password :(</a>   
                    </div>
                </div>

                <div class="buttonText"><!--Button for login that will go to home screen-->
                    <a href="Page2(Home).html" class="button">Login</a>
                </div>
                
                <p>Don't have an account? Click <a href="Page1(SignUp).html">here</a> to Signup!</p><!--Link to signup if user doesn't have account-->
            </main>
        </div>
        <!--This section is foooter for contact details-->
        <div class="foot">
            <footer><!--Inserting number, email, etc as lists-->
                Contact Information:
                <ul>
                    <li><b>Number:</b> +92 34 2501 5859;</li>
                    <li><b>Email:</b> omnistyle_query@gmail.com</li>
                    <li><b>Address:</b> Islamabad, H11/4</li>
                    <li><b>Linkedin:</b> linkedin.com/in/linkedin.com/ln/OmniStyle</li>
                    <li><b>Instagram:</b> @OmniStyle</li>
                </ul>    
            </footer>  
        </div>  
    </body>
</html>
